<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Data</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🎓 Student Performance Predictor</div>
        <div class="nav-links">
            <a href="/">Predict</a>
            <a href="/add-data">Add Data</a>
        </div>
    </nav>

    <div class="container">
        {% if success %}
        <div class="alert success">
            ✅ Student data added successfully! Total students in dataset: {{ total }}
            <form action="/retrain" method="POST" style="margin-top: 12px;">
                <button type="submit" class="btn btn-small">🔄 Retrain Model with New Data</button>
            </form>
        </div>
        {% endif %}

        {% if error %}
        <div class="alert error">⚠️ {{ error }}</div>
        {% endif %}

        <div class="card">
            <h2>Add New Student Data</h2>
            <p class="subtitle">Add real student data to improve model accuracy over time.</p>
            <form action="/add-data" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" name="age" min="10" max="30" placeholder="e.g. 17" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>School Type</label>
                        <select name="school_type" required>
                            <option value="">Select</option>
                            <option value="public">Public</option>
                            <option value="private">Private</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Parent Education</label>
                        <select name="parent_education" required>
                            <option value="">Select</option>
                            <option value="none">None</option>
                            <option value="primary">Primary</option>
                            <option value="secondary">Secondary</option>
                            <option value="higher">Higher</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Daily Study Hours</label>
                        <input type="number" name="study_hours" min="0" max="12" step="0.5" placeholder="e.g. 6" required>
                    </div>
                    <div class="form-group">
                        <label>Attendance Percentage</label>
                        <input type="number" name="attendance_percentage" min="0" max="100" placeholder="e.g. 80" required>
                    </div>
                    <div class="form-group">
                        <label>Internet Access</label>
                        <select name="internet_access" required>
                            <option value="">Select</option>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Travel Time</label>
                        <select name="travel_time" required>
                            <option value="">Select</option>
                            <option value="less than 15 min">Less than 15 min</option>
                            <option value="15 to 30 min">15 to 30 min</option>
                            <option value="30 min to 1 hour">30 min to 1 hour</option>
                            <option value="more than 1 hour">More than 1 hour</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Extra Activities</label>
                        <select name="extra_activities" required>
                            <option value="">Select</option>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Study Method</label>
                        <select name="study_method" required>
                            <option value="">Select</option>
                            <option value="self-study">Self Study</option>
                            <option value="group-study">Group Study</option>
                            <option value="tutoring">Tutoring</option>
                            <option value="online">Online</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Math Score (0-100)</label>
                        <input type="number" name="math_score" min="0" max="100" placeholder="e.g. 75" required>
                    </div>
                    <div class="form-group">
                        <label>Science Score (0-100)</label>
                        <input type="number" name="science_score" min="0" max="100" placeholder="e.g. 70" required>
                    </div>
                    <div class="form-group">
                        <label>English Score (0-100)</label>
                        <input type="number" name="english_score" min="0" max="100" placeholder="e.g. 65" required>
                    </div>
                    <div class="form-group">
                        <label>Final Grade (Actual Result)</label>
                        <select name="final_grade" required>
                            <option value="">Select</option>
                            <option value="a">A - Excellent</option>
                            <option value="b">B - Good</option>
                            <option value="c">C - Average</option>
                            <option value="d">D - Below Average</option>
                            <option value="e">E - Poor</option>
                            <option value="f">F - Fail</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn">➕ Add Student Data</button>
            </form>
        </div>
    </div>
</body>
</html>
